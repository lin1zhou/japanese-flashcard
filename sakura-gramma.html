<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 30%, #e8eaf6 60%, #fce4ec 100%);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #3d3058;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

/* ---------- 主容器：响应式 ---------- */
.app-container {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  max-width: 420px;
  max-height: 750px;
  background: #ffffff;
  border-radius: 0;
  box-shadow: none;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border: none;
}

/* 中等屏幕及以上：卡片浮窗效果 */
@media (min-width: 440px) {
  body {
    padding: 16px;
  }
  .app-container {
    width: 380px;
    height: 550px;
    border-radius: 20px;
    box-shadow:
      0 4px 24px rgba(180, 140, 170, 0.18),
      0 1px 4px rgba(180, 140, 170, 0.10);
    border: 1px solid rgba(220, 190, 210, 0.4);
  }
}

/* 平板横屏 */
@media (min-width: 768px) and (min-height: 600px) {
  .app-container {
    width: 400px;
    height: 580px;
  }
}

/* ---------- 顶部标题栏 ---------- */
.header {
  background: linear-gradient(135deg, #fce4ec, #f8d8e8);
  padding: 14px 20px;
  text-align: center;
  border-bottom: 1px solid rgba(220, 180, 200, 0.35);
  flex-shrink: 0;
}

.header .title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #b85070;
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.header .title .sakura-icon {
  font-size: 1.3rem;
}

/* ---------- 控制栏 ---------- */
.controls {
  display: flex;
  gap: 10px;
  padding: 12px 20px;
  background: #fef9fb;
  border-bottom: 1px solid rgba(220, 190, 210, 0.25);
  flex-shrink: 0;
}

.control-group {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.control-group label {
  font-size: 0.78rem;
  color: #9888a8;
  white-space: nowrap;
  font-weight: 500;
}

.control-group select {
  flex: 1;
  padding: 7px 10px;
  border: 1.5px solid rgba(210, 180, 210, 0.5);
  border-radius: 10px;
  background: #fff;
  color: #3d3058;
  font-size: 0.82rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}

.control-group select:focus {
  border-color: #e0a0b8;
  box-shadow: 0 0 0 2px rgba(230, 160, 180, 0.15);
}

/* ---------- 进度条 ---------- */
.progress-area {
  padding: 10px 20px;
  flex-shrink: 0;
}

.progress-text {
  font-size: 0.75rem;
  color: #9888a8;
  text-align: center;
  margin-bottom: 6px;
}

.progress-bar-track {
  width: 100%;
  height: 5px;
  background: #f0e0e8;
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #e8a0b8, #d0b0e0);
  border-radius: 3px;
  transition: width 0.35s ease;
}

/* ---------- 卡片区域 ---------- */
.card-stage {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 12px 20px;
  min-height: 0;
}

/* 卡片3D翻转容器 */
.card-scene {
  width: 100%;
  max-width: 340px;
  perspective: 900px;
}

.card-inner {
  position: relative;
  width: 100%;
  min-height: 240px;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

/* 翻转状态 */
.card-inner.flipped {
  transform: rotateY(180deg);
  cursor: default;
}

/* --- 正面 --- */
.card-front,
.card-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 16px;
  border: 1px solid rgba(210, 190, 220, 0.35);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #fff;
  box-shadow: 0 2px 12px rgba(160, 130, 160, 0.08);
  padding: 24px 20px;
}

.card-front {
  gap: 12px;
}

.card-front .grammar-text {
  font-size: 1.5rem;
  font-weight: 700;
  color: #3d3058;
  text-align: center;
  line-height: 1.6;
  word-break: keep-all;
}

.card-front .hint {
  font-size: 0.75rem;
  color: #c0a8b8;
  letter-spacing: 0.05em;
}

.card-front .level-badge {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 8px;
  letter-spacing: 0.05em;
}

.level-badge.n2 {
  background: rgba(160, 140, 210, 0.18);
  color: #6858a0;
}

.level-badge.n3 {
  background: rgba(210, 140, 160, 0.18);
  color: #a05870;
}

/* --- 背面 --- */
.card-back {
  transform: rotateY(180deg);
  justify-content: flex-start;
  align-items: stretch;
  gap: 14px;
  overflow-y: auto;
  cursor: default;
  padding: 22px 18px;
}

/* 背面滚动条美化 */
.card-back::-webkit-scrollbar {
  width: 4px;
}
.card-back::-webkit-scrollbar-track {
  background: transparent;
}
.card-back::-webkit-scrollbar-thumb {
  background: rgba(200, 170, 190, 0.4);
  border-radius: 2px;
}

.card-back .back-section {
  text-align: left;
}

.card-back .back-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: #b85070;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.card-back .back-content {
  font-size: 0.92rem;
  color: #3d3058;
  line-height: 1.7;
}

.card-back .back-divider {
  height: 1px;
  background: rgba(220, 190, 210, 0.35);
  margin: 2px 0;
}

/* 背面等级标签 */
.card-back .level-badge-back {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
}

/* ---------- 按钮区 ---------- */
.btn-area {
  padding: 14px 20px 18px;
  display: flex;
  gap: 12px;
  flex-shrink: 0;
  opacity: 0.3;
  pointer-events: none;
  transition: opacity 0.3s;
}

.btn-area.active {
  opacity: 1;
  pointer-events: auto;
}

.btn {
  flex: 1;
  padding: 12px 0;
  border: none;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  font-family: inherit;
  color: #fff;
}

.btn:active {
  transform: scale(0.97);
}

.btn-remember {
  background: linear-gradient(135deg, #7ecb8a, #5db870);
  box-shadow: 0 2px 8px rgba(100, 180, 120, 0.3);
}

.btn-remember:hover {
  background: linear-gradient(135deg, #8dd899, #6cc47d);
  box-shadow: 0 4px 14px rgba(100, 180, 120, 0.4);
}

.btn-forgotten {
  background: linear-gradient(135deg, #f0b088, #e89868);
  box-shadow: 0 2px 8px rgba(220, 140, 100, 0.3);
}

.btn-forgotten:hover {
  background: linear-gradient(135deg, #f4c098, #eea878);
  box-shadow: 0 4px 14px rgba(220, 140, 100, 0.4);
}

/* ---------- 完成画面 ---------- */
.finished-screen {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 30px 20px;
  text-align: center;
}

.finished-screen.show {
  display: flex;
}

.finished-screen .finish-icon {
  font-size: 2.8rem;
}

.finished-screen .finish-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: #3d3058;
}

.finished-screen .finish-stats {
  font-size: 0.88rem;
  color: #6d6088;
  line-height: 1.8;
}

.finished-screen .finish-stats span {
  font-weight: 700;
}

.finished-screen .finish-stats .remembered-count {
  color: #5db870;
}

.finished-screen .finish-stats .forgotten-count {
  color: #e89868;
}

.btn-restart {
  margin-top: 8px;
  padding: 12px 36px;
  border: none;
  border-radius: 24px;
  background: linear-gradient(135deg, #e8a0b8, #c898d0);
  color: #fff;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  box-shadow: 0 3px 12px rgba(190, 140, 180, 0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  font-family: inherit;
}

.btn-restart:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 18px rgba(190, 140, 180, 0.45);
}

.btn-restart:active {
  transform: scale(0.97);
}

/* ---------- 空状态 ---------- */
.empty-state {
  display: none;
  flex: 1;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #9888a8;
  font-size: 0.88rem;
  padding: 30px;
  line-height: 1.8;
}

.empty-state.show {
  display: flex;
}

/* ---------- 移动端微调 ---------- */
@media (max-width: 439px) {
  .header {
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
  }

  .header .title {
    font-size: 1rem;
  }

  .controls {
    padding: 10px 14px;
    gap: 8px;
  }

  .control-group select {
    padding: 8px 8px;
    font-size: 0.88rem; /* 防止 iOS 缩放 */
  }

  .progress-area {
    padding: 8px 16px;
  }

  .card-stage {
    padding: 8px 14px;
  }

  .card-front,
  .card-back {
    padding: 20px 16px;
    border-radius: 14px;
  }

  .card-front .grammar-text {
    font-size: 1.3rem;
  }

  .card-back .back-content {
    font-size: 0.88rem;
  }

  .btn-area {
    padding: 12px 14px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    gap: 10px;
  }

  .btn {
    padding: 14px 0;
    font-size: 0.9rem;
  }
}

/* 小屏手机 (< 360px) */
@media (max-width: 359px) {
  .card-front .grammar-text {
    font-size: 1.15rem;
  }

  .card-back .back-content {
    font-size: 0.82rem;
  }

  .btn {
    padding: 12px 0;
    font-size: 0.85rem;
  }

  .header .title {
    font-size: 0.9rem;
  }
}

/* 横屏手机：限制最大高度 */
@media (max-height: 440px) and (orientation: landscape) {
  .app-container {
    max-height: 100vh;
    max-height: 100dvh;
  }

  .header {
    padding: 6px 16px;
  }

  .controls {
    padding: 6px 14px;
  }

  .progress-area {
    padding: 4px 16px;
  }

  .card-inner {
    min-height: 160px;
  }

  .card-front .grammar-text {
    font-size: 1.1rem;
  }

  .btn-area {
    padding: 8px 14px 10px;
  }
}
</style>
</head>
<body>

<div class="app-container">

  <!-- ===== ① 标题栏 ===== -->
  <div class="header">
    <div class="title">
      <span class="sakura-icon">&#x1F338;</span>
      sakura-gramma
    </div>
  </div>

  <!-- ===== ② 控制栏 ===== -->
  <div class="controls">
    <div class="control-group">
      <label for="levelSelect">等级</label>
      <select id="levelSelect">
        <option value="N2">N2</option>
        <option value="N3">N3</option>
      </select>
    </div>
    <div class="control-group">
      <label for="countSelect">每次</label>
      <select id="countSelect">
        <option value="3">3 条</option>
        <option value="5" selected>5 条</option>
        <option value="8">8 条</option>
        <option value="10">10 条</option>
      </select>
    </div>
  </div>

  <!-- ===== ③ 进度条 ===== -->
  <div class="progress-area" id="progressArea">
    <div class="progress-text" id="progressText">第 1 / 5 张</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
    </div>
  </div>

  <!-- ===== ④ 卡片区 ===== -->
  <div class="card-stage" id="cardStage">
    <div class="card-scene" id="cardScene">
      <div class="card-inner" id="cardInner">

        <!-- 正面 -->
        <div class="card-front" id="cardFront">
          <span class="level-badge n2" id="levelBadge">N2</span>
          <div class="grammar-text" id="grammarText"></div>
          <div class="hint">点击显示答案</div>
        </div>

        <!-- 背面 -->
        <div class="card-back" id="cardBack">
          <span class="level-badge-back n2" id="levelBadgeBack">N2</span>
          <div class="back-section">
            <div class="back-label">意思</div>
            <div class="back-content" id="meaningText"></div>
          </div>
          <div class="back-divider"></div>
          <div class="back-section">
            <div class="back-label">例句</div>
            <div class="back-content" id="exampleJp"></div>
          </div>
          <div class="back-divider"></div>
          <div class="back-section">
            <div class="back-label">翻译</div>
            <div class="back-content" id="exampleCn"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ===== ⑤ 按钮区 ===== -->
  <div class="btn-area" id="btnArea">
    <button class="btn btn-remember" id="btnRemember">&#x2713; 记住</button>
    <button class="btn btn-forgotten" id="btnForgotten">&#x2605; 不熟</button>
  </div>

  <!-- ===== 完成画面 ===== -->
  <div class="finished-screen" id="finishedScreen">
    <div class="finish-icon">&#x1F338;</div>
    <div class="finish-title">本轮完成！</div>
    <div class="finish-stats" id="finishStats"></div>
    <button class="btn-restart" id="btnRestart">再来一组</button>
  </div>

  <!-- ===== 空状态 ===== -->
  <div class="empty-state" id="emptyState">
    该等级暂无数据。<br>请切换等级或加载题库。
  </div>

</div>

<script>
// ============================================================
// SAKURA-GRAMMA — JavaScript

// ========== 模块 4.1：数据层 DataStore ==========
var DataStore = {
  all: GRAMMAR_DATA,

  /** 返回指定等级的全部条目 */
  getByLevel: function(level) {
    return this.all.filter(function(item) { return item.l === level; });
  },

  /** 按 id 查找单条 */
  getById: function(id) {
    return this.all.find(function(item) { return item.id === id; });
  },

  /** 返回该等级条目总数 */
  count: function(level) {
    return this.all.filter(function(item) { return item.l === level; }).length;
  }
};

// ========== 模块 4.2：进度持久化 ProgressStore ==========
var STORAGE_KEY = 'sakura_gramma_progress';

var ProgressStore = {
  _data: {},

  /** 从 localStorage 加载 */
  load: function() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) this._data = JSON.parse(raw);
    } catch(e) {
      this._data = {};
    }
  },

  /** 写入 localStorage */
  save: function() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data));
    } catch(e) {
      console.warn('localStorage save failed:', e);
    }
  },

  /** 返回某 id 的进度，无记录返回 null */
  get: function(id) {
    return this._data[id] || null;
  },

  /** 计算下次复习日期间隔（天） */
  _getInterval: function(reviewCount) {
    if (reviewCount === 0) return 1;
    if (reviewCount === 1) return 3;
    if (reviewCount === 2) return 7;
    return 30;
  },

  /** 返回今天 YYYY-MM-DD */
  _today: function() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  },

  /** 给日期字符串加 n 天 */
  _addDays: function(dateStr, n) {
    var d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  },

  /** 标记"记住"：进阶间隔 */
  markRemembered: function(id) {
    var existing = this._data[id];
    var newCount = (existing ? existing.rc : 0) + 1;
    var interval = this._getInterval(newCount);
    this._data[id] = {
      rc: newCount,
      rd: this._addDays(this._today(), interval),
      ls: this._today()
    };
  },

  /** 标记"不熟"：重置为明天 */
  markForgotten: function(id) {
    this._data[id] = {
      rc: 0,
      rd: this._addDays(this._today(), 1),
      ls: this._today()
    };
  }
};

// ========== 模块 4.3：抽取引擎 Picker ==========
var Picker = {
  /**
   * 按优先级抽取 count 条语法
   * @param {string} level - 'N2' | 'N3'
   * @param {number} count - 抽取数量
   * @returns {Array} 条目数组
   */
  pick: function(level, count) {
    var pool = DataStore.getByLevel(level).slice();
    if (pool.length === 0) return [];

    var today = ProgressStore._today();
    var selected = [];
    var remaining = pool.slice();

    // --- P1: 到期需复习 (review_date <= today) ---
    var p1 = remaining.filter(function(item) {
      var p = ProgressStore.get(item.id);
      return p && p.rd && p.rd <= today;
    });
    // 按 review_date 升序（越早到期越靠前）
    p1.sort(function(a, b) {
      var da = ProgressStore.get(a.id).rd;
      var db = ProgressStore.get(b.id).rd;
      return da.localeCompare(db);
    });
    p1.forEach(function(item) {
      if (selected.length >= count) return;
      selected.push(item);
      var idx = remaining.findIndex(function(r) { return r.id === item.id; });
      if (idx >= 0) remaining.splice(idx, 1);
    });

    // --- P2: 从未见过 (无 localStorage 记录) ---
    if (selected.length < count) {
      var p2 = remaining.filter(function(item) { return !ProgressStore.get(item); });
      this._shuffle(p2);
      p2.forEach(function(item) {
        if (selected.length >= count) return;
        selected.push(item);
        var idx = remaining.findIndex(function(r) { return r.id === item.id; });
        if (idx >= 0) remaining.splice(idx, 1);
      });
    }

    // --- P3: 随机旧条目补足 ---
    if (selected.length < count) {
      this._shuffle(remaining);
      remaining.forEach(function(item) {
        if (selected.length >= count) return;
        selected.push(item);
      });
    }

    // 最终打乱顺序
    this._shuffle(selected);
    return selected;
  },

  /** Fisher-Yates 洗牌 */
  _shuffle: function(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
  }
};

// ========== 模块 4.4：会话状态 Session ==========
var Session = {
  level: 'N2',
  count: 5,
  queue: [],
  index: 0,
  isFlipped: false,
  stats: { remembered: 0, forgotten: 0 },

  /** 初始化新的一轮 */
  init: function(level, count) {
    this.level = level;
    this.count = count;
    this.queue = Picker.pick(level, count);
    this.index = 0;
    this.isFlipped = false;
    this.stats = { remembered: 0, forgotten: 0 };
  },

  /** 当前显示的卡片 */
  currentCard: function() {
    if (this.index >= this.queue.length) return null;
    return this.queue[this.index];
  },

  /** 还有下一张？ */
  hasMore: function() {
    return this.index < this.queue.length - 1;
  },

  /** 翻到下一张 */
  advance: function() {
    this.index += 1;
    this.isFlipped = false;
    return this.currentCard();
  },

  /** 进度信息 */
  progress: function() {
    return {
      current: Math.min(this.index + 1, this.queue.length),
      total: this.queue.length
    };
  },

  /** 本轮是否完成 */
  isFinished: function() {
    return this.queue.length === 0 || this.index >= this.queue.length;
  }
};

// ========== 模块 4.5：UI 渲染 Renderer ==========
var Renderer = {
  els: {},

  /** 初始化 DOM 引用 */
  _initRefs: function() {
    this.els = {
      levelSelect:    document.getElementById('levelSelect'),
      countSelect:    document.getElementById('countSelect'),
      progressText:   document.getElementById('progressText'),
      progressBar:    document.getElementById('progressBar'),
      progressArea:   document.getElementById('progressArea'),
      cardScene:      document.getElementById('cardScene'),
      cardInner:      document.getElementById('cardInner'),
      cardFront:      document.getElementById('cardFront'),
      cardBack:       document.getElementById('cardBack'),
      grammarText:    document.getElementById('grammarText'),
      levelBadge:     document.getElementById('levelBadge'),
      levelBadgeBack: document.getElementById('levelBadgeBack'),
      meaningText:    document.getElementById('meaningText'),
      exampleJp:      document.getElementById('exampleJp'),
      exampleCn:      document.getElementById('exampleCn'),
      btnArea:        document.getElementById('btnArea'),
      cardStage:      document.getElementById('cardStage'),
      finishedScreen: document.getElementById('finishedScreen'),
      finishStats:    document.getElementById('finishStats'),
      emptyState:     document.getElementById('emptyState'),
    };
  },

  /** 渲染卡片正面 */
  showCard: function(card) {
    var level = card.l;
    var levelLower = level.toLowerCase();

    // 正面
    this.els.grammarText.textContent = card.g;
    this.els.levelBadge.textContent = level;
    this.els.levelBadge.className = 'level-badge ' + levelLower;

    // 背面
    this.els.meaningText.textContent = card.m;
    this.els.exampleJp.textContent = card.ej;
    this.els.exampleCn.textContent = card.ec;
    this.els.levelBadgeBack.textContent = level;
    this.els.levelBadgeBack.className = 'level-badge-back ' + levelLower;

    // 恢复正面朝上
    this.els.cardInner.classList.remove('flipped');
    // 重置背面滚动位置
    this.els.cardBack.scrollTop = 0;

    // 隐藏按钮
    this.els.btnArea.classList.remove('active');

    // 显示卡片区，隐藏完成画面和空状态
    this.els.cardStage.style.display = '';
    this.els.cardScene.style.display = '';
    this.els.finishedScreen.classList.remove('show');
    this.els.emptyState.classList.remove('show');
  },

  /** 翻转卡片到背面 */
  flipCard: function() {
    this.els.cardInner.classList.add('flipped');
    this.els.btnArea.classList.add('active');
  },

  /** 更新进度条 */
  updateProgress: function(current, total) {
    if (total === 0) {
      this.els.progressText.textContent = '无卡片';
      this.els.progressBar.style.width = '0%';
      return;
    }
    this.els.progressText.textContent = '第 ' + current + ' / ' + total + ' 张';
    this.els.progressBar.style.width = ((current / total) * 100) + '%';
  },

  /** 显示完成画面 */
  showFinished: function(stats) {
    this.els.cardScene.style.display = 'none';
    this.els.cardStage.style.display = '';
    this.els.finishedScreen.classList.add('show');
    this.els.btnArea.classList.remove('active');
    this.els.progressText.textContent = '完成';
    this.els.progressBar.style.width = '100%';

    this.els.finishStats.innerHTML =
      '记住 <span class="remembered-count">' + stats.remembered + '</span> 条' +
      ' · ' +
      '不熟 <span class="forgotten-count">' + stats.forgotten + '</span> 条';
  },

  /** 显示空状态 */
  showEmpty: function() {
    this.els.cardScene.style.display = 'none';
    this.els.finishedScreen.classList.remove('show');
    this.els.emptyState.classList.add('show');
    this.els.btnArea.classList.remove('active');
    this.els.progressText.textContent = '';
    this.els.progressBar.style.width = '0%';
  },

  /** 同步下拉框 */
  syncSelects: function(level, count) {
    this.els.levelSelect.value = level;
    this.els.countSelect.value = String(count);
  }
};

// ========== 模块 4.6：控制器 Controller ==========
var Controller = {
  /** 初始化 */
  init: function() {
    Renderer._initRefs();
    ProgressStore.load();

    var level = 'N2';
    var count = 5;

    Session.init(level, count);
    Renderer.syncSelects(level, count);

    this._renderCurrentCard();
    this._bindEvents();
  },

  /** 渲染当前卡片或完成/空状态 */
  _renderCurrentCard: function() {
    if (Session.queue.length === 0) {
      Renderer.showEmpty();
      return;
    }

    if (Session.isFinished()) {
      Renderer.showFinished(Session.stats);
      return;
    }

    var card = Session.currentCard();
    if (!card) {
      Renderer.showEmpty();
      return;
    }

    Renderer.showCard(card);
    Renderer.updateProgress(Session.progress().current, Session.progress().total);
  },

  /** 绑定事件 */
  _bindEvents: function() {
    var self = this;

    // 等级切换
    Renderer.els.levelSelect.addEventListener('change', function() {
      var level = Renderer.els.levelSelect.value;
      var count = parseInt(Renderer.els.countSelect.value);
      Session.init(level, count);
      Renderer.syncSelects(level, count);
      self._renderCurrentCard();
    });

    // 数量切换
    Renderer.els.countSelect.addEventListener('change', function() {
      var level = Renderer.els.levelSelect.value;
      var count = parseInt(Renderer.els.countSelect.value);
      Session.init(level, count);
      Renderer.syncSelects(level, count);
      self._renderCurrentCard();
    });

    // 点击卡片 → 翻转
    Renderer.els.cardInner.addEventListener('click', function(e) {
      if (e.target.closest && e.target.closest('.btn')) return;
      if (Session.isFlipped) return;
      if (Session.isFinished()) return;
      Session.isFlipped = true;
      Renderer.flipCard();
    });

    // 点击「记住」
    document.getElementById('btnRemember').addEventListener('click', function() {
      if (!Session.isFlipped) return;
      var card = Session.currentCard();
      if (!card) return;
      ProgressStore.markRemembered(card.id);
      ProgressStore.save();
      Session.stats.remembered += 1;
      self._goNext();
    });

    // 点击「不熟」
    document.getElementById('btnForgotten').addEventListener('click', function() {
      if (!Session.isFlipped) return;
      var card = Session.currentCard();
      if (!card) return;
      ProgressStore.markForgotten(card.id);
      ProgressStore.save();
      Session.stats.forgotten += 1;
      self._goNext();
    });

    // 点击「再来一组」
    document.getElementById('btnRestart').addEventListener('click', function() {
      var level = Renderer.els.levelSelect.value;
      var count = parseInt(Renderer.els.countSelect.value);
      Session.init(level, count);
      self._renderCurrentCard();
    });
  },

  /** 翻到下一张 */
  _goNext: function() {
    if (Session.hasMore()) {
      Session.advance();
      this._renderCurrentCard();
    } else {
      // 最后一张操作完毕 → 完成
      Renderer.showFinished(Session.stats);
    }
  }
};

// ========== 启动 ==========
document.addEventListener('DOMContentLoaded', function() {
  Controller.init();
});
</script>
